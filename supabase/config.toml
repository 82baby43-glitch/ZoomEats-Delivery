# ZoomEats Supabase project
# https://supabase.com/dashboard/project/njrrhckegbfqhwkqkzvw

project_id = "njrrhckegbfqhwkqkzvw"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://zoomeats.net"
additional_redirect_urls = [
  "https://zoomeats.net/auth/callback",
  "https://zoomeats.net/**",
  "https://www.zoomeats.net/auth/callback",
  "https://www.zoomeats.net/**",
  "https://driver.zoomeats.net/auth/callback",
  "https://driver.zoomeats.net/**",
  "https://restaurant.zoomeats.net/auth/callback",
  "https://restaurant.zoomeats.net/**",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/**"
]

# Google OAuth is configured in Supabase Dashboard (Auth → Providers → Google).
# [auth.external.google]
# enabled = true

# Stripe sends unsigned requests — verify via stripe-signature in the handler instead.
[functions.stripe-webhook]
verify_jwt = false

# Cron / service calls authenticate with RECONCILE_CRON_SECRET in the handler.
[functions.reconcile-payments]
verify_jwt = false

# Invoked by database triggers / internal dispatch, not end-user JWTs.
[functions.dispatch-order]
verify_jwt = false

[functions.offer-order]
verify_jwt = false

# Routing intelligence layer — GPS ingestion + continuous optimization loop.
[functions.routing-engine]
verify_jwt = false
